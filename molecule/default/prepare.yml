---
- name: Prepare test instance
  hosts: all
  become: true
  tasks:
    - name: Install pip
      ansible.builtin.apt:
        name: python3-pip
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install Python requests module
      ansible.builtin.pip:
        name: requests

    - name: Install Docker SDK for Python (community.docker)
      ansible.builtin.apt:
        name: python3-docker
        state: present
      when: ansible_facts['os_family'] == 'Debian'
