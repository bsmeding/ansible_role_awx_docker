---
# AWX -p ports bind on the Docker daemon host. The Molecule instance runs with
# etc_hosts host.docker.internal:host-gateway (molecule.yml) so checks here reach AWX.
# Do not use http://localhost — nothing listens there for AWX inside the instance.
- name: Verify - AWX is running
  hosts: all
  become: false
  gather_facts: false
  tasks:
    - name: Include default vars
      ansible.builtin.include_vars:
        dir: "{{ playbook_dir }}/../../defaults"
        extensions:
          - "yml"

    - name: Check that AWX responds (host.docker.internal = Docker host)
      ansible.builtin.uri:
        url: "http://host.docker.internal:{{ awx__port_web_http }}/"
        method: GET
        status_code: [200, 301, 302, 401, 403]
        follow_redirects: safe
      register: awx_output
      retries: 30
      delay: 10
      until: awx_output is succeeded

    - name: Verify awx web container exists and is running
      community.docker.docker_container_info:
        name: "awx_{{ awx__setting_awx_web_hostname }}"
      register: awx_container_info

    - name: Check awx web container status
      ansible.builtin.assert:
        that:
          - awx_container_info.exists
          - awx_container_info.container.State.Status == "running"
        fail_msg: "AWX web container is not running"
