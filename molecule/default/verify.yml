---
# AWX publishes ports on the Docker daemon (GitHub runner). Probing from the Molecule
# container via host.docker.internal often hits hairpin/NAT and ends in RST. Run the
# HTTP check on the Ansible controller (runner) against 127.0.0.1 instead.
- name: Verify - AWX is running
  hosts: all
  become: false
  gather_facts: false
  tasks:
    - name: Include default vars
      ansible.builtin.include_vars:
        dir: "{{ playbook_dir }}/../../defaults"
        extensions:
          - "yml"

    - name: Check that AWX responds on published host port (runner localhost)
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ awx__port_web_http }}/"
        method: GET
        status_code: [200, 301, 302, 401, 403]
        follow_redirects: safe
      register: awx_output
      retries: 30
      delay: 10
      until: awx_output is succeeded
      delegate_to: localhost
      connection: local
      run_once: true

    - name: Verify awx web container exists and is running
      community.docker.docker_container_info:
        name: "awx_{{ awx__setting_awx_web_hostname }}"
      register: awx_container_info

    - name: Check awx web container status
      ansible.builtin.assert:
        that:
          - awx_container_info.exists
          - awx_container_info.container.State.Status == "running"
        fail_msg: "AWX web container is not running"
