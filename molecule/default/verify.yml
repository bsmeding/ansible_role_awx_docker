---
# Host-published ports (e.g. 9080→8052) are unreliable to probe from the runner or from
# the Molecule instance on GitHub Actions (RST / hairpin). Validate AWX by hitting the
# web container's nginx HTTP port from inside that container (matches role map ...:8052).
- name: Verify - AWX is running
  hosts: all
  become: false
  gather_facts: false
  tasks:
    - name: Include default vars
      ansible.builtin.include_vars:
        dir: "{{ playbook_dir }}/../../defaults"
        extensions:
          - "yml"

    - name: Set verify facts (after defaults are loaded)
      ansible.builtin.set_fact:
        awx_web_container_name: "awx_{{ awx__setting_awx_web_hostname }}"
        # Internal HTTP port in ansible/awx image (see install_awx_docker_17_1_0.yml ports).
        awx_container_http_port: 8052

    - name: Verify awx web container exists and is running
      community.docker.docker_container_info:
        name: "{{ awx_web_container_name }}"
      register: awx_container_info

    - name: Check awx web container status
      ansible.builtin.assert:
        that:
          - awx_container_info.exists
          - awx_container_info.container.State.Status == "running"
        fail_msg: "AWX web container is not running"

    # Use argv style to avoid shell-quoting/parsing issues in docker exec.
    - name: Check AWX HTTP inside web container (bypasses host port mapping)
      community.docker.docker_container_exec:
        container: "{{ awx_web_container_name }}"
        command:
          - curl
          - -fsS
          - --connect-timeout
          - "5"
          - --max-time
          - "20"
          - -o
          - /dev/null
          - "http://127.0.0.1:{{ awx_container_http_port }}/"
      register: awx_http_check
      retries: 18
      delay: 5
      until: awx_http_check.get('rc', awx_http_check.get('exit_code', 1)) == 0
      changed_when: false
